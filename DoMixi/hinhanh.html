<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hình Ảnh - Bộ Tộc MixiGaming</title>
    <style>
      :root {
        --main-red: #c62828;
        --dark-red: #8e0000;
        --bg-color: #121212;
        --container-bg: #1e1e1e;
        --text-color: #f5f5f5;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
        line-height: 1.6;
      }
      header {
        background-color: var(--main-red);
        padding: 30px 20px;
        text-align: center;
        border-bottom: 5px solid var(--dark-red);
      }
      header h1 {
        margin: 0;
        font-size: 2.5rem;
        text-transform: uppercase;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }
      nav {
        background-color: #000;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        position: sticky;
        top: 0;
        z-index: 100;
        border-bottom: 2px solid #333;
      }
      nav a {
        color: white;
        text-decoration: none;
        padding: 15px 25px;
        font-size: 1.1rem;
        font-weight: bold;
        transition: 0.3s;
      }
      nav a:hover,
      nav a.active {
        background-color: var(--main-red);
      }
      .container {
        max-width: 1000px;
        margin: 40px auto;
        padding: 30px;
        background-color: var(--container-bg);
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      }
      h2 {
        color: var(--main-red);
        border-bottom: 2px solid var(--main-red);
        padding-bottom: 10px;
        margin-top: 0;
      }
      footer {
        background-color: #000;
        text-align: center;
        padding: 20px;
        margin-top: 40px;
        border-top: 3px solid var(--main-red);
        color: #aaa;
      }

      /* CSS Thư viện ảnh */
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }
      .gallery img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 8px;
        border: 2px solid #333;
        transition:
          transform 0.3s,
          border-color 0.3s;
      }
      .gallery img:hover {
        transform: scale(1.05);
        border-color: var(--main-red);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Thư Viện Hình Ảnh</h1>
    </header>

    <nav>
      <a href="index.html">Trang Chủ</a>
      <a href="gioithieu.html">Giới Thiệu</a>
      <a href="lichstream.html">Lịch Stream</a>
      <a href="hinhanh.html" class="active">Hình Ảnh</a>
      <a href="dangky.html">Đăng Ký Thành Viên</a>
    </nav>

    <div class="container">
      <h2>Không gian góc làm việc & Game</h2>
      <div class="gallery">
        <img
          src="https://images.unsplash.com/photo-1598550476439-6847785fcea6?q=80&w=2000&auto=format&fit=crop"
          alt="Góc stream 1"
        />
        <img
          src="https://images.unsplash.com/photo-1538481199705-c710c4e965fc?q=80&w=2000&auto=format&fit=crop"
          alt="Bàn phím cơ"
        />
        <img
          src="https://images.unsplash.com/photo-1563986768494-4dee2763ff3f?q=80&w=2000&auto=format&fit=crop"
          alt="Tai nghe gaming"
        />
        <img
          src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2000&auto=format&fit=crop"
          alt="Màn hình chơi game"
        />
        <img
          src="https://images.unsplash.com/photo-1552820728-8b83bb6b773f?q=80&w=2000&auto=format&fit=crop"
          alt="Tay cầm chơi game"
        />
        <img
          src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop"
          alt="PC Gaming"
        />
      </div>
    </div>

    <footer>
      <p>
        &copy; 2026 MixiGaming. Thiết kế bởi một thành viên chân chính của Bộ
        Tộc.
      </p>
    </footer>
  </body>
</html>
