    function clone(v) { return JSON.parse(JSON.stringify(v)); }
    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    function escapeAttr(str) { return escapeHtml(str).replace(/`/g, "&#96;"); }
    function parseDateKey(dateStr) {
      if (!dateStr) return null;
      const parts = String(dateStr).split("-").map(Number);
      if (parts.length !== 3 || parts.some((n) => Number.isNaN(n))) return null;
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }
    function fmtDate(dateStr) {
      const d = parseDateKey(dateStr);
      if (!d) return "Chưa xếp lịch";
      return `${String(d.getDate()).padStart(2, "0")}/${String(d.getMonth() + 1).padStart(2, "0")}/${d.getFullYear()}`;
    }
    function sortSchedule(items) {
      return [...items].sort((a, b) => {
        const da = parseDateKey(a.date);
        const db = parseDateKey(b.date);
        if (da && db && da.getTime() !== db.getTime()) return da - db;
        if (da && !db) return -1;
        if (!da && db) return 1;
        return String(a.id).localeCompare(String(b.id));
      });
    }
    function groupByDate(items) {
      const sorted = sortSchedule(items);
      const groups = [];
      let current = null;
      for (const item of sorted) {
        const key = item.date || "__none__";
        if (!current || current.key !== key) {
          current = { key, date: item.date || "", items: [] };
          groups.push(current);
        }
        current.items.push(item);
      }
      return groups;
    }

    function startSync() {
      currentDocRef = doc(db, "artifacts", APP_ID, "public", "data", "v1", shareId);
      onSnapshot(currentDocRef, (snap) => {

          appData = snap.data();
          normalizeData();
          onData();
        } else {
          normalizeData();
          saveData();
          onData();
        }
      }, (err) => {
        const st = document.getElementById("status");
        if (st) st.textContent = "Lỗi tải dữ liệu: " + err.message;
      });
    }
    async function saveData() {

    function subjectBadge(subject) {
      return subject === "Lý"
        ? "bg-rose-100 text-rose-700"
        : "bg-blue-100 text-blue-700";
    }

    const search = document.getElementById('search');
    const reviewList = document.getElementById('review-list');
    const count = document.getElementById('count');
    let keyword = '';

    function materialChip(label, url) {
      return `<a href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 rounded-xl border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-50"><i class="fa-solid fa-link text-indigo-500"></i> ${escapeHtml(label)}</a>`;
    }
    function cardHtml(item) {
      const materials = Array.isArray(item.materials) ? item.materials.filter((m) => m && m.url) : [];
      return `<article class="bg-white rounded-3xl card p-5 sm:p-6"><div class="flex flex-col lg:flex-row lg:items-start justify-between gap-4"><div class="min-w-0"><div class="flex flex-wrap items-center gap-2 mb-3"><span class="inline-flex rounded-full px-3 py-1 text-[11px] font-extrabold ${subjectBadge(item.subject)}">${escapeHtml(item.subject || '')}</span>${item.sourceLabel ? `<span class="text-[11px] font-semibold uppercase tracking-wider text-slate-400">${escapeHtml(item.sourceLabel)}</span>` : ''}</div><h2 class="text-xl font-bold text-slate-800 break-words">${escapeHtml(item.title || '')}</h2><div class="text-xs text-slate-500 mt-2">Cập nhật: ${escapeHtml(item.updatedAt ? new Date(item.updatedAt).toLocaleString('vi-VN') : '—')}</div></div>${item.videoUrl ? `<a href="${escapeAttr(item.videoUrl)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center gap-2 rounded-2xl bg-indigo-600 px-4 py-3 text-sm font-bold text-white hover:bg-indigo-700"><i class="fa-solid fa-circle-play"></i> Mở video</a>` : '<div class="text-sm text-slate-400 italic">Chưa có video</div>'}</div>${materials.length ? `<div class="mt-5 flex flex-wrap gap-2">${materials.map((m) => materialChip(m.label || m.url, m.url)).join('')}</div>` : '<div class="mt-5 text-sm text-slate-400 italic">Chưa có tài liệu đính kèm</div>'}</article>`;
    }
    function matches(item, q) {
      if (!q) return true;
      const hay = [item.subject, item.title, item.sourceLabel, item.videoUrl, ...(Array.isArray(item.materials) ? item.materials.flatMap((m) => [m.label, m.url]) : [])].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(q);
    }
    function onData() {
      const lessons = Array.isArray(appData.reviewLessons) ? appData.reviewLessons : [];
      const filtered = lessons.filter((x) => matches(x, keyword));
      count.textContent = `${filtered.length}/${lessons.length} bài`;
      if (!lessons.length) {
        reviewList.innerHTML = `<div class="bg-white rounded-3xl card p-10 text-center text-slate-400 italic">Chưa có bài giảng nào</div>`;
      } else if (!filtered.length) {
        reviewList.innerHTML = `<div class="bg-white rounded-3xl card p-10 text-center text-slate-400 italic">Không tìm thấy kết quả phù hợp</div>`;
      } else {
        reviewList.innerHTML = filtered.map(cardHtml).join('');
      }
      document.getElementById('status').textContent = 'Đã tải';
    }
    search.addEventListener('input', () => { keyword = search.value.trim().toLowerCase(); onData(); });

    window.addEventListener("DOMContentLoaded", boot);
  </script>

</body>
</html>
